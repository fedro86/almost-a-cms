<!-- Form Field Components Library -->
<!-- Reusable Alpine.js components for different field types -->

<!-- Basic Text Input Field -->
<template x-teleport="body" id="text-field-template">
    <div class="form-field" x-data="textField($field, $value)">
        <label :for="field.name" class="block text-sm font-medium text-gray-700 mb-1">
            <span x-text="field.label"></span>
            <span x-show="field.required" class="text-red-500">*</span>
        </label>
        <input
            :type="field.widget_type === 'email' ? 'email' : field.widget_type === 'url' ? 'url' : field.widget_type === 'password' ? 'password' : 'text'"
            :id="field.name"
            :name="field.name"
            x-model="value"
            :placeholder="field.placeholder"
            :required="field.required"
            :minlength="field.min_length"
            :maxlength="field.max_length"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            :class="{'border-red-500': hasError}"
            @blur="validateField"
            @input="clearError">

        <div x-show="field.description" class="mt-1 text-sm text-gray-500">
            <span x-text="field.description"></span>
        </div>

        <div x-show="errorMessage" class="mt-1 text-sm text-red-600">
            <span x-text="errorMessage"></span>
        </div>

        <div x-show="field.max_length" class="mt-1 text-xs text-gray-400 text-right">
            <span x-text="(value || '').length"></span>/<span x-text="field.max_length"></span>
        </div>
    </div>
</template>

<!-- Textarea Field -->
<template x-teleport="body" id="textarea-field-template">
    <div class="form-field" x-data="textareaField($field, $value)">
        <label :for="field.name" class="block text-sm font-medium text-gray-700 mb-1">
            <span x-text="field.label"></span>
            <span x-show="field.required" class="text-red-500">*</span>
        </label>
        <textarea
            :id="field.name"
            :name="field.name"
            x-model="value"
            :placeholder="field.placeholder"
            :required="field.required"
            :minlength="field.min_length"
            :maxlength="field.max_length"
            rows="4"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            :class="{'border-red-500': hasError, 'h-32': field.name.includes('bio') || field.name.includes('description')}"
            @blur="validateField"
            @input="clearError"></textarea>

        <div x-show="field.description" class="mt-1 text-sm text-gray-500">
            <span x-text="field.description"></span>
        </div>

        <div x-show="errorMessage" class="mt-1 text-sm text-red-600">
            <span x-text="errorMessage"></span>
        </div>

        <div x-show="field.max_length" class="mt-1 text-xs text-gray-400 text-right">
            <span x-text="(value || '').length"></span>/<span x-text="field.max_length"></span>
        </div>
    </div>
</template>

<!-- Number Field -->
<template x-teleport="body" id="number-field-template">
    <div class="form-field" x-data="numberField($field, $value)">
        <label :for="field.name" class="block text-sm font-medium text-gray-700 mb-1">
            <span x-text="field.label"></span>
            <span x-show="field.required" class="text-red-500">*</span>
        </label>
        <input
            type="number"
            :id="field.name"
            :name="field.name"
            x-model.number="value"
            :placeholder="field.placeholder"
            :required="field.required"
            :min="field.min_value"
            :max="field.max_value"
            :step="field.field_type === 'number' ? 'any' : '1'"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            :class="{'border-red-500': hasError}"
            @blur="validateField"
            @input="clearError">

        <div x-show="field.description" class="mt-1 text-sm text-gray-500">
            <span x-text="field.description"></span>
        </div>

        <div x-show="errorMessage" class="mt-1 text-sm text-red-600">
            <span x-text="errorMessage"></span>
        </div>

        <div x-show="field.min_value !== null || field.max_value !== null" class="mt-1 text-xs text-gray-400">
            Range: <span x-text="field.min_value || 'no min'"></span> - <span x-text="field.max_value || 'no max'"></span>
        </div>
    </div>
</template>

<!-- Checkbox Field -->
<template x-teleport="body" id="checkbox-field-template">
    <div class="form-field" x-data="checkboxField($field, $value)">
        <div class="flex items-center">
            <input
                type="checkbox"
                :id="field.name"
                :name="field.name"
                x-model="value"
                class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
            <label :for="field.name" class="ml-2 block text-sm text-gray-900">
                <span x-text="field.label"></span>
                <span x-show="field.required" class="text-red-500">*</span>
            </label>
        </div>

        <div x-show="field.description" class="mt-1 text-sm text-gray-500 ml-6">
            <span x-text="field.description"></span>
        </div>
    </div>
</template>

<!-- Date Field -->
<template x-teleport="body" id="date-field-template">
    <div class="form-field" x-data="dateField($field, $value)">
        <label :for="field.name" class="block text-sm font-medium text-gray-700 mb-1">
            <span x-text="field.label"></span>
            <span x-show="field.required" class="text-red-500">*</span>
        </label>
        <input
            type="date"
            :id="field.name"
            :name="field.name"
            x-model="value"
            :required="field.required"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            :class="{'border-red-500': hasError}"
            @blur="validateField"
            @change="clearError">

        <div x-show="field.description" class="mt-1 text-sm text-gray-500">
            <span x-text="field.description"></span>
        </div>

        <div x-show="errorMessage" class="mt-1 text-sm text-red-600">
            <span x-text="errorMessage"></span>
        </div>
    </div>
</template>

<!-- File Field (Basic) -->
<template x-teleport="body" id="file-field-template">
    <div class="form-field" x-data="fileField($field, $value)">
        <label :for="field.name" class="block text-sm font-medium text-gray-700 mb-1">
            <span x-text="field.label"></span>
            <span x-show="field.required" class="text-red-500">*</span>
        </label>

        <!-- Current file display -->
        <div x-show="value && (value.path || value.url)" class="mb-2 p-2 bg-gray-50 rounded border">
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-700" x-text="value.filename || value.path || 'File selected'"></span>
                <button type="button" @click="clearFile" class="text-red-600 hover:text-red-800 text-sm">Remove</button>
            </div>
        </div>

        <!-- File input -->
        <input
            type="file"
            :id="field.name"
            :name="field.name"
            :required="field.required && !value"
            :accept="getAcceptedFileTypes()"
            @change="handleFileSelect"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            :class="{'border-red-500': hasError}">

        <div x-show="field.description" class="mt-1 text-sm text-gray-500">
            <span x-text="field.description"></span>
        </div>

        <div x-show="errorMessage" class="mt-1 text-sm text-red-600">
            <span x-text="errorMessage"></span>
        </div>

        <div class="mt-1 text-xs text-gray-400">
            <span x-show="field.name.includes('image') || field.name.includes('avatar')">Accepted: JPG, PNG, GIF, WebP</span>
            <span x-show="!field.name.includes('image') && !field.name.includes('avatar')">Accepted: PDF, DOC, DOCX and common file types</span>
        </div>
    </div>
</template>

<!-- Array Field (Simple strings) -->
<template x-teleport="body" id="array-field-template">
    <div class="form-field" x-data="arrayField($field, $value)">
        <label class="block text-sm font-medium text-gray-700 mb-1">
            <span x-text="field.label"></span>
            <span x-show="field.required" class="text-red-500">*</span>
        </label>

        <div class="space-y-2">
            <template x-for="(item, index) in items" :key="index">
                <div class="flex items-center gap-2">
                    <input
                        type="text"
                        x-model="item.value"
                        :placeholder="`${field.label} ${index + 1}`"
                        class="flex-1 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        @blur="updateValue">
                    <button
                        type="button"
                        @click="removeItem(index)"
                        class="p-2 text-red-600 hover:text-red-800 hover:bg-red-50 rounded">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </template>
        </div>

        <button
            type="button"
            @click="addItem"
            class="mt-2 px-3 py-1 text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 rounded border">
            <i class="fas fa-plus mr-1"></i> Add <span x-text="field.label.slice(0, -1)"></span>
        </button>

        <div x-show="field.description" class="mt-1 text-sm text-gray-500">
            <span x-text="field.description"></span>
        </div>

        <div x-show="errorMessage" class="mt-1 text-sm text-red-600">
            <span x-text="errorMessage"></span>
        </div>
    </div>
</template>

<!-- Nested Object Field -->
<template x-teleport="body" id="nested-object-field-template">
    <div class="form-field" x-data="nestedObjectField($field, $value)">
        <div class="border rounded-lg p-4 bg-gray-50">
            <h3 class="text-lg font-medium text-gray-900 mb-4">
                <span x-text="field.label"></span>
                <span x-show="field.required" class="text-red-500">*</span>
            </h3>

            <div class="space-y-4">
                <template x-for="nestedField in field.nested_schema.fields" :key="nestedField.name">
                    <div x-data="{ fieldValue: getNestedValue(nestedField.name) }">
                        <!-- Render appropriate field type -->
                        <div x-show="nestedField.widget_type === 'input' || nestedField.widget_type === 'email' || nestedField.widget_type === 'url' || nestedField.widget_type === 'password'"
                             x-html="renderTextField(nestedField, fieldValue)"></div>
                        <div x-show="nestedField.widget_type === 'textarea'"
                             x-html="renderTextareaField(nestedField, fieldValue)"></div>
                        <div x-show="nestedField.widget_type === 'number'"
                             x-html="renderNumberField(nestedField, fieldValue)"></div>
                        <div x-show="nestedField.widget_type === 'checkbox'"
                             x-html="renderCheckboxField(nestedField, fieldValue)"></div>
                        <div x-show="nestedField.widget_type === 'date'"
                             x-html="renderDateField(nestedField, fieldValue)"></div>
                    </div>
                </template>
            </div>

            <div x-show="field.description" class="mt-2 text-sm text-gray-500">
                <span x-text="field.description"></span>
            </div>
        </div>
    </div>
</template>

<!-- Nested Array Field (Complex objects) -->
<template x-teleport="body" id="nested-array-field-template">
    <div class="form-field" x-data="nestedArrayField($field, $value)">
        <div class="border rounded-lg p-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-medium text-gray-900">
                    <span x-text="field.label"></span>
                    <span x-show="field.required" class="text-red-500">*</span>
                </h3>
                <span class="text-sm text-gray-500" x-text="`${items.length} items`"></span>
            </div>

            <!-- Array items -->
            <div class="space-y-4">
                <template x-for="(item, itemIndex) in items" :key="itemIndex">
                    <div class="border border-gray-200 rounded-lg p-4 bg-white relative">
                        <div class="flex items-center justify-between mb-3">
                            <h4 class="font-medium text-gray-700" x-text="`${field.label.slice(0, -1)} ${itemIndex + 1}`"></h4>
                            <div class="flex space-x-2">
                                <button type="button" @click="moveItemUp(itemIndex)"
                                        :disabled="itemIndex === 0"
                                        class="p-1 text-gray-400 hover:text-gray-600 disabled:opacity-50">
                                    <i class="fas fa-chevron-up"></i>
                                </button>
                                <button type="button" @click="moveItemDown(itemIndex)"
                                        :disabled="itemIndex === items.length - 1"
                                        class="p-1 text-gray-400 hover:text-gray-600 disabled:opacity-50">
                                    <i class="fas fa-chevron-down"></i>
                                </button>
                                <button type="button" @click="removeItem(itemIndex)"
                                        class="p-1 text-red-600 hover:text-red-800">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <template x-for="nestedField in field.array_item_schema.fields" :key="nestedField.name">
                                <div x-data="{ fieldValue: getArrayItemValue(itemIndex, nestedField.name) }">
                                    <!-- Render appropriate field type for array items -->
                                    <div x-show="nestedField.widget_type === 'input' || nestedField.widget_type === 'email' || nestedField.widget_type === 'url' || nestedField.widget_type === 'password'"
                                         x-html="renderArrayTextField(nestedField, fieldValue, itemIndex)"></div>
                                    <div x-show="nestedField.widget_type === 'textarea'"
                                         x-html="renderArrayTextareaField(nestedField, fieldValue, itemIndex)"></div>
                                    <div x-show="nestedField.widget_type === 'number'"
                                         x-html="renderArrayNumberField(nestedField, fieldValue, itemIndex)"></div>
                                    <div x-show="nestedField.widget_type === 'checkbox'"
                                         x-html="renderArrayCheckboxField(nestedField, fieldValue, itemIndex)"></div>
                                    <div x-show="nestedField.widget_type === 'date'"
                                         x-html="renderArrayDateField(nestedField, fieldValue, itemIndex)"></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Add new item button -->
            <button type="button" @click="addItem"
                    class="mt-4 w-full px-4 py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-600 hover:border-gray-400 hover:text-gray-800">
                <i class="fas fa-plus mr-2"></i> Add <span x-text="field.label.slice(0, -1)"></span>
            </button>

            <div x-show="field.description" class="mt-2 text-sm text-gray-500">
                <span x-text="field.description"></span>
            </div>
        </div>
    </div>
</template>

<!-- Media Upload Field with Drag & Drop -->
<template x-teleport="body" id="media-upload-field-template">
    <div class="form-field" x-data="mediaUploadField($field, $value)">
        <label class="block text-sm font-medium text-gray-700 mb-1">
            <span x-text="field.label"></span>
            <span x-show="field.required" class="text-red-500">*</span>
        </label>

        <!-- Drag and drop area -->
        <div
            x-ref="dropzone"
            @dragover.prevent="dragover = true"
            @dragleave.prevent="dragover = false"
            @drop.prevent="handleDrop"
            :class="{'border-blue-500 bg-blue-50': dragover, 'border-red-500': hasError}"
            class="relative border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-gray-400 transition-colors">

            <!-- Upload area content -->
            <div x-show="!uploading && !value">
                <div class="mx-auto w-12 h-12 text-gray-400 mb-4">
                    <i class="fas fa-cloud-upload-alt text-4xl"></i>
                </div>
                <p class="text-sm text-gray-600 mb-2">
                    <span class="font-medium">Click to upload</span> or drag and drop
                </p>
                <p class="text-xs text-gray-500">
                    PNG, JPG, GIF, WebP up to 10MB
                </p>
            </div>

            <!-- Upload progress -->
            <div x-show="uploading" class="flex items-center justify-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mr-3"></div>
                <span class="text-sm text-gray-600">Uploading...</span>
            </div>

            <!-- Uploaded file preview -->
            <div x-show="!uploading && value" class="space-y-4">
                <div x-show="value && value.url" class="relative inline-block">
                    <img :src="value.url" :alt="value.filename"
                         class="max-w-full max-h-48 rounded shadow-sm">
                    <button type="button" @click="removeFile"
                            class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600">
                        <i class="fas fa-times text-xs"></i>
                    </button>
                </div>
                <div class="text-sm text-gray-600">
                    <p class="font-medium" x-text="value.original_filename"></p>
                    <p class="text-xs text-gray-500" x-text="formatFileSize(value.file_size)"></p>
                </div>
            </div>

            <!-- Hidden file input -->
            <input type="file"
                   x-ref="fileInput"
                   @change="handleFileSelect"
                   :accept="getAcceptedTypes()"
                   class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
        </div>

        <!-- Media library button -->
        <div class="mt-2 flex justify-between items-center">
            <button type="button" @click="openMediaLibrary"
                    class="text-sm text-blue-600 hover:text-blue-800">
                <i class="fas fa-images mr-1"></i>Choose from library
            </button>
            <div x-show="multiple" class="text-xs text-gray-500">
                <span x-text="Array.isArray(value) ? value.length : (value ? 1 : 0)"></span>
                file<span x-show="Array.isArray(value) ? value.length !== 1 : false">s</span> selected
            </div>
        </div>

        <div x-show="field.description" class="mt-1 text-sm text-gray-500">
            <span x-text="field.description"></span>
        </div>

        <div x-show="errorMessage" class="mt-1 text-sm text-red-600">
            <span x-text="errorMessage"></span>
        </div>
    </div>
</template>

<!-- Media Library Modal -->
<template x-teleport="body" id="media-library-modal-template">
    <div x-data="mediaLibraryModal()" x-show="$store.mediaLibrary.isOpen"
         x-cloak @keydown.escape.window="$store.mediaLibrary.close()"
         class="fixed inset-0 z-50 overflow-y-auto">

        <!-- Backdrop -->
        <div class="fixed inset-0 bg-black bg-opacity-50" @click="$store.mediaLibrary.close()"></div>

        <!-- Modal -->
        <div class="flex min-h-screen items-center justify-center p-4">
            <div class="relative bg-white rounded-lg shadow-xl max-w-6xl w-full max-h-[80vh] overflow-hidden"
                 @click.stop>

                <!-- Header -->
                <div class="flex items-center justify-between p-6 border-b">
                    <h2 class="text-lg font-semibold text-gray-900">Media Library</h2>
                    <button @click="$store.mediaLibrary.close()"
                            class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <!-- Content -->
                <div class="p-6 overflow-y-auto max-h-[60vh]">
                    <!-- Loading state -->
                    <div x-show="loading" class="text-center py-8">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-4"></div>
                        <p class="text-gray-600">Loading media files...</p>
                    </div>

                    <!-- Empty state -->
                    <div x-show="!loading && mediaFiles.length === 0" class="text-center py-8">
                        <div class="text-gray-400 text-4xl mb-4">
                            <i class="fas fa-images"></i>
                        </div>
                        <p class="text-gray-600">No media files found</p>
                        <p class="text-sm text-gray-500 mt-1">Upload some images to get started</p>
                    </div>

                    <!-- Media grid -->
                    <div x-show="!loading && mediaFiles.length > 0"
                         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                        <template x-for="media in mediaFiles" :key="media.filename">
                            <div class="relative group cursor-pointer border-2 border-transparent hover:border-blue-500 rounded-lg overflow-hidden"
                                 :class="{'border-blue-500 bg-blue-50': selectedMedia && selectedMedia.filename === media.filename}"
                                 @click="selectMedia(media)">
                                <img :src="media.url" :alt="media.original_filename"
                                     class="w-full h-24 object-cover">
                                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-20 transition-opacity"></div>
                                <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black to-transparent p-2">
                                    <p class="text-xs text-white truncate" x-text="media.original_filename"></p>
                                </div>
                                <!-- Selection indicator -->
                                <div x-show="selectedMedia && selectedMedia.filename === media.filename"
                                     class="absolute top-2 right-2 w-6 h-6 bg-blue-500 text-white rounded-full flex items-center justify-center">
                                    <i class="fas fa-check text-xs"></i>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Footer -->
                <div class="flex items-center justify-between p-6 border-t bg-gray-50">
                    <div class="text-sm text-gray-600">
                        <span x-show="selectedMedia" x-text="`Selected: ${selectedMedia?.original_filename}`"></span>
                        <span x-show="!selectedMedia">Select a file to continue</span>
                    </div>
                    <div class="space-x-3">
                        <button @click="$store.mediaLibrary.close()"
                                class="px-4 py-2 text-gray-700 border border-gray-300 rounded hover:bg-gray-50">
                            Cancel
                        </button>
                        <button @click="confirmSelection"
                                :disabled="!selectedMedia"
                                class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">
                            Select
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>

<script>
// Field component functions
function textField(field, initialValue) {
    return {
        field: field,
        value: initialValue || field.default || '',
        errorMessage: '',
        hasError: false,

        validateField() {
            this.errorMessage = '';
            this.hasError = false;

            if (this.field.required && !this.value) {
                this.errorMessage = `${this.field.label} is required`;
                this.hasError = true;
                return false;
            }

            if (this.field.min_length && this.value.length < this.field.min_length) {
                this.errorMessage = `Minimum length is ${this.field.min_length} characters`;
                this.hasError = true;
                return false;
            }

            if (this.field.max_length && this.value.length > this.field.max_length) {
                this.errorMessage = `Maximum length is ${this.field.max_length} characters`;
                this.hasError = true;
                return false;
            }

            if (this.field.widget_type === 'email' && this.value && !this.isValidEmail(this.value)) {
                this.errorMessage = 'Please enter a valid email address';
                this.hasError = true;
                return false;
            }

            if (this.field.widget_type === 'url' && this.value && !this.isValidUrl(this.value)) {
                this.errorMessage = 'Please enter a valid URL';
                this.hasError = true;
                return false;
            }

            return true;
        },

        clearError() {
            this.hasError = false;
            this.errorMessage = '';
        },

        isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        },

        isValidUrl(url) {
            try {
                new URL(url);
                return true;
            } catch {
                return false;
            }
        }
    };
}

function textareaField(field, initialValue) {
    return textField(field, initialValue);
}

function numberField(field, initialValue) {
    return {
        field: field,
        value: initialValue || field.default || (field.field_type === 'integer' ? 0 : 0.0),
        errorMessage: '',
        hasError: false,

        validateField() {
            this.errorMessage = '';
            this.hasError = false;

            if (this.field.required && (this.value === null || this.value === undefined || this.value === '')) {
                this.errorMessage = `${this.field.label} is required`;
                this.hasError = true;
                return false;
            }

            if (this.value !== null && this.value !== undefined && this.value !== '') {
                const num = parseFloat(this.value);

                if (isNaN(num)) {
                    this.errorMessage = 'Please enter a valid number';
                    this.hasError = true;
                    return false;
                }

                if (this.field.min_value !== null && num < this.field.min_value) {
                    this.errorMessage = `Minimum value is ${this.field.min_value}`;
                    this.hasError = true;
                    return false;
                }

                if (this.field.max_value !== null && num > this.field.max_value) {
                    this.errorMessage = `Maximum value is ${this.field.max_value}`;
                    this.hasError = true;
                    return false;
                }
            }

            return true;
        },

        clearError() {
            this.hasError = false;
            this.errorMessage = '';
        }
    };
}

function checkboxField(field, initialValue) {
    return {
        field: field,
        value: initialValue !== undefined ? initialValue : (field.default !== undefined ? field.default : false)
    };
}

function dateField(field, initialValue) {
    return {
        field: field,
        value: initialValue || field.default || '',
        errorMessage: '',
        hasError: false,

        validateField() {
            this.errorMessage = '';
            this.hasError = false;

            if (this.field.required && !this.value) {
                this.errorMessage = `${this.field.label} is required`;
                this.hasError = true;
                return false;
            }

            return true;
        },

        clearError() {
            this.hasError = false;
            this.errorMessage = '';
        }
    };
}

function fileField(field, initialValue) {
    return {
        field: field,
        value: initialValue || field.default || null,
        errorMessage: '',
        hasError: false,

        handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                // For now, create a simple file object representation
                this.value = {
                    filename: file.name,
                    size: file.size,
                    type: file.type,
                    path: null, // Will be set after upload
                    url: null   // Will be set after processing
                };
                this.clearError();
            }
        },

        clearFile() {
            this.value = null;
            // Clear the file input
            const input = document.getElementById(this.field.name);
            if (input) input.value = '';
        },

        getAcceptedFileTypes() {
            if (this.field.name.includes('image') || this.field.name.includes('avatar')) {
                return 'image/*';
            }
            return '.pdf,.doc,.docx,.txt,.rtf';
        }
    };
}

function arrayField(field, initialValue) {
    return {
        field: field,
        items: [],
        errorMessage: '',
        hasError: false,

        init() {
            // Initialize items from the initial value
            if (Array.isArray(initialValue)) {
                this.items = initialValue.map(item => ({ value: item }));
            } else {
                this.items = [];
            }

            // Ensure at least one empty item if field is required
            if (this.items.length === 0 && this.field.required) {
                this.addItem();
            }
        },

        addItem() {
            this.items.push({ value: '' });
        },

        removeItem(index) {
            this.items.splice(index, 1);
            this.updateValue();
        },

        updateValue() {
            // Update the parent value with current array items
            const values = this.items.map(item => item.value).filter(value => value.trim() !== '');
            this.$dispatch('field-updated', { name: this.field.name, value: values });
        }
    };
}

function nestedObjectField(field, initialValue) {
    return {
        field: field,
        value: initialValue || field.default || {},

        init() {
            // Initialize with default values from schema
            if (this.field.nested_schema && this.field.nested_schema.fields) {
                this.field.nested_schema.fields.forEach(nestedField => {
                    if (!(nestedField.name in this.value)) {
                        this.value[nestedField.name] = nestedField.default || '';
                    }
                });
            }
        },

        getNestedValue(fieldName) {
            return this.value[fieldName] || '';
        },

        updateNestedValue(fieldName, newValue) {
            this.value[fieldName] = newValue;
            this.$dispatch('field-updated', { name: this.field.name, value: this.value });
        },

        // Simple field renderers for nested fields
        renderTextField(nestedField, fieldValue) {
            return `<input type="${nestedField.widget_type === 'email' ? 'email' : nestedField.widget_type === 'url' ? 'url' : 'text'}"
                           value="${fieldValue || ''}"
                           placeholder="${nestedField.placeholder || ''}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md"
                           @input="updateNestedValue('${nestedField.name}', $event.target.value)">`;
        }
    };
}

function nestedArrayField(field, initialValue) {
    return {
        field: field,
        items: [],

        init() {
            // Initialize items from the initial value
            if (Array.isArray(initialValue)) {
                this.items = initialValue.map(item => ({ ...item }));
            } else {
                this.items = [];
            }
        },

        addItem() {
            const newItem = {};
            // Initialize with default values from array item schema
            if (this.field.array_item_schema && this.field.array_item_schema.fields) {
                this.field.array_item_schema.fields.forEach(nestedField => {
                    newItem[nestedField.name] = nestedField.default || '';
                });
            }
            this.items.push(newItem);
            this.updateValue();
        },

        removeItem(index) {
            this.items.splice(index, 1);
            this.updateValue();
        },

        moveItemUp(index) {
            if (index > 0) {
                const item = this.items.splice(index, 1)[0];
                this.items.splice(index - 1, 0, item);
                this.updateValue();
            }
        },

        moveItemDown(index) {
            if (index < this.items.length - 1) {
                const item = this.items.splice(index, 1)[0];
                this.items.splice(index + 1, 0, item);
                this.updateValue();
            }
        },

        getArrayItemValue(itemIndex, fieldName) {
            return this.items[itemIndex] ? this.items[itemIndex][fieldName] : '';
        },

        updateArrayItemValue(itemIndex, fieldName, newValue) {
            if (this.items[itemIndex]) {
                this.items[itemIndex][fieldName] = newValue;
                this.updateValue();
            }
        },

        updateValue() {
            this.$dispatch('field-updated', { name: this.field.name, value: this.items });
        },

        // Simple field renderers for array item fields
        renderArrayTextField(nestedField, fieldValue, itemIndex) {
            return `<label class="block text-sm font-medium text-gray-700">${nestedField.label}</label>
                    <input type="${nestedField.widget_type === 'email' ? 'email' : nestedField.widget_type === 'url' ? 'url' : 'text'}"
                           value="${fieldValue || ''}"
                           placeholder="${nestedField.placeholder || ''}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md mt-1"
                           @input="updateArrayItemValue(${itemIndex}, '${nestedField.name}', $event.target.value)">`;
        },

        renderArrayTextareaField(nestedField, fieldValue, itemIndex) {
            return `<label class="block text-sm font-medium text-gray-700">${nestedField.label}</label>
                    <textarea rows="3"
                              placeholder="${nestedField.placeholder || ''}"
                              class="w-full px-3 py-2 border border-gray-300 rounded-md mt-1"
                              @input="updateArrayItemValue(${itemIndex}, '${nestedField.name}', $event.target.value)">${fieldValue || ''}</textarea>`;
        },

        renderArrayNumberField(nestedField, fieldValue, itemIndex) {
            return `<label class="block text-sm font-medium text-gray-700">${nestedField.label}</label>
                    <input type="number"
                           value="${fieldValue || ''}"
                           placeholder="${nestedField.placeholder || ''}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md mt-1"
                           @input="updateArrayItemValue(${itemIndex}, '${nestedField.name}', parseFloat($event.target.value))">`;
        },

        renderArrayCheckboxField(nestedField, fieldValue, itemIndex) {
            return `<div class="flex items-center mt-2">
                        <input type="checkbox"
                               ${fieldValue ? 'checked' : ''}
                               class="h-4 w-4 text-blue-600 rounded"
                               @change="updateArrayItemValue(${itemIndex}, '${nestedField.name}', $event.target.checked)">
                        <label class="ml-2 text-sm text-gray-900">${nestedField.label}</label>
                    </div>`;
        },

        renderArrayDateField(nestedField, fieldValue, itemIndex) {
            return `<label class="block text-sm font-medium text-gray-700">${nestedField.label}</label>
                    <input type="date"
                           value="${fieldValue || ''}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md mt-1"
                           @change="updateArrayItemValue(${itemIndex}, '${nestedField.name}', $event.target.value)">`;
        }
    };
}

// Media Upload Field Component
function mediaUploadField(field, initialValue) {
    return {
        field: field,
        value: initialValue || null,
        errorMessage: '',
        hasError: false,
        uploading: false,
        dragover: false,
        multiple: field.multiple || false,

        async handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (files.length > 0) {
                await this.uploadFiles(files);
            }
        },

        async handleDrop(event) {
            this.dragover = false;
            const files = Array.from(event.dataTransfer.files);
            if (files.length > 0) {
                await this.uploadFiles(files);
            }
        },

        async uploadFiles(files) {
            if (this.uploading) return;

            this.uploading = true;
            this.clearError();

            try {
                // Create FormData for upload
                const formData = new FormData();

                if (this.multiple) {
                    // Multiple file upload
                    files.forEach(file => {
                        if (this.validateFile(file)) {
                            formData.append('files', file);
                        }
                    });

                    const response = await fetch('/api/media-api/upload-multiple', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.getAttribute('content')
                        }
                    });

                    const result = await response.json();

                    if (result.success && result.data.uploaded.length > 0) {
                        this.value = result.data.uploaded;
                        this.$dispatch('field-updated', { name: this.field.name, value: this.value });
                    } else {
                        throw new Error(result.message || 'Upload failed');
                    }
                } else {
                    // Single file upload
                    const file = files[0];
                    if (!this.validateFile(file)) {
                        return;
                    }

                    formData.append('file', file);

                    const response = await fetch('/api/media-api/upload', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.getAttribute('content')
                        }
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.value = result.data;
                        this.$dispatch('field-updated', { name: this.field.name, value: this.value });
                    } else {
                        throw new Error(result.message || 'Upload failed');
                    }
                }
            } catch (error) {
                this.errorMessage = error.message || 'Upload failed';
                this.hasError = true;
            } finally {
                this.uploading = false;
            }
        },

        validateFile(file) {
            const maxSize = 10 * 1024 * 1024; // 10MB
            const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif', 'image/webp'];

            if (!allowedTypes.includes(file.type)) {
                this.errorMessage = 'Invalid file type. Please upload an image file.';
                this.hasError = true;
                return false;
            }

            if (file.size > maxSize) {
                this.errorMessage = 'File too large. Maximum size is 10MB.';
                this.hasError = true;
                return false;
            }

            return true;
        },

        removeFile() {
            this.value = null;
            this.$refs.fileInput.value = '';
            this.$dispatch('field-updated', { name: this.field.name, value: null });
        },

        openMediaLibrary() {
            this.$store.mediaLibrary.open((selectedMedia) => {
                this.value = selectedMedia;
                this.$dispatch('field-updated', { name: this.field.name, value: selectedMedia });
            });
        },

        getAcceptedTypes() {
            return 'image/jpeg,image/jpg,image/png,image/gif,image/webp';
        },

        formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        },

        clearError() {
            this.hasError = false;
            this.errorMessage = '';
        }
    };
}

// Media Library Modal Component
function mediaLibraryModal() {
    return {
        loading: false,
        mediaFiles: [],
        selectedMedia: null,

        init() {
            // Load media files when modal opens
            this.$watch('$store.mediaLibrary.isOpen', (isOpen) => {
                if (isOpen) {
                    this.loadMediaFiles();
                }
            });
        },

        async loadMediaFiles() {
            this.loading = true;
            try {
                const response = await fetch('/api/media-api/list');
                const result = await response.json();

                if (result.success) {
                    this.mediaFiles = result.data;
                } else {
                    console.error('Failed to load media files:', result.message);
                }
            } catch (error) {
                console.error('Error loading media files:', error);
            } finally {
                this.loading = false;
            }
        },

        selectMedia(media) {
            this.selectedMedia = media;
        },

        confirmSelection() {
            if (this.selectedMedia && this.$store.mediaLibrary.callback) {
                this.$store.mediaLibrary.callback(this.selectedMedia);
            }
            this.$store.mediaLibrary.close();
        }
    };
}

// Alpine.js store for media library
document.addEventListener('alpine:init', () => {
    Alpine.store('mediaLibrary', {
        isOpen: false,
        callback: null,

        open(callback) {
            this.callback = callback;
            this.isOpen = true;
        },

        close() {
            this.isOpen = false;
            this.callback = null;
        }
    });
});
