{% extends "admin/base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Dashboard Header -->
    <div class="bg-white shadow rounded-lg p-6">
        <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
        <p class="text-gray-600">Overview of your portfolio site</p>
    </div>

    <!-- Content Overview -->
    <div class="bg-white shadow rounded-lg p-6" x-data="contentOverview()">
        <h2 class="text-lg font-medium text-gray-900 mb-4">Content Overview</h2>

        <div class="space-y-4" x-show="!loading">
            <template x-for="contentType in contentTypes" :key="contentType.name">
                <div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <i :class="getIcon(contentType.name)" class="text-2xl text-blue-600"></i>
                        </div>
                        <div class="ml-4">
                            <h3 class="text-lg font-medium text-gray-900" x-text="formatContentType(contentType.name)"></h3>
                            <p class="text-sm text-gray-600" x-text="contentType.description || 'No description'"></p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                              :class="contentType.exists ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'"
                              x-text="contentType.exists ? 'Configured' : 'Not Set'">
                        </span>
                        <a :href="'/admin/content/' + contentType.name"
                           class="text-blue-600 hover:text-blue-800 text-sm font-medium">
                            Edit →
                        </a>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="loading" class="text-center py-8">
            <i class="fas fa-spinner fa-spin text-2xl text-gray-400"></i>
            <p class="text-gray-600 mt-2">Loading content overview...</p>
        </div>
    </div>

    <!-- Recent Activity -->
    <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-lg font-medium text-gray-900 mb-4">Recent Activity</h2>
        <div class="text-gray-600 text-center py-8">
            <i class="fas fa-clock text-2xl mb-2"></i>
            <p>Activity tracking will be available in a future update</p>
        </div>
    </div>
</div>

<script>
function contentOverview() {
    return {
        contentTypes: [],
        loading: true,

        async init() {
            await this.loadContentTypes();
        },

        async loadContentTypes() {
            try {
                const response = await apiRequest('/api/content/types/registry');
                const existingResponse = await apiRequest('/api/content/types');

                const existingTypes = new Set(existingResponse.content_types);

                this.contentTypes = response.content_types.map(type => ({
                    name: type,
                    exists: existingTypes.has(type),
                    description: this.getDescription(type)
                }));
            } catch (error) {
                console.error('Failed to load content types:', error);
                showToast('Failed to load content overview', 'error');
            } finally {
                this.loading = false;
            }
        },

        getIcon(contentType) {
            const icons = {
                'personal_info': 'fas fa-user',
                'about': 'fas fa-info-circle',
                'resume': 'fas fa-file-alt',
                'portfolio': 'fas fa-briefcase',
                'blog': 'fas fa-blog',
                'contact': 'fas fa-envelope',
                'navigation': 'fas fa-bars'
            };
            return icons[contentType] || 'fas fa-file';
        },

        formatContentType(type) {
            return type.split('_').map(word =>
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        },

        getDescription(type) {
            const descriptions = {
                'personal_info': 'Your basic information and contact details',
                'about': 'Tell your story and showcase your services',
                'resume': 'Your professional experience and skills',
                'portfolio': 'Showcase your projects and work',
                'blog': 'Share your thoughts and insights',
                'contact': 'How people can reach you',
                'navigation': 'Site navigation and menu structure'
            };
            return descriptions[type] || '';
        }
    };
}
</script>
{% endblock %}
